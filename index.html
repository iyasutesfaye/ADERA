
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADERA - Secure File Sharing Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.5s ease-out;
        }

        .container-dashboard {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        .container-share {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        h1 {
            text-align: center;
            color: #1E3A5F;
            font-size: 52px;
            margin-bottom: 8px;
        }

        h2 {
            color: #1E3A5F;
            font-size: 24px;
            margin-bottom: 20px;
        }

        h3 {
            color: #1E3A5F;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .tagline {
            text-align: center;
            color: #6B7280;
            margin-bottom: 35px;
            font-size: 14px;
        }

        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #F3F4F6;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #1E3A5F;
            color: white;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #1E3A5F;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #1E3A5F;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn:hover {
            background: #2E4A6F;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: #DC2626;
        }

        .btn-danger:hover {
            background: #B91C1C;
        }

        .btn-success {
            background: #10B981;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #1E3A5F;
            color: #1E3A5F;
        }

        .btn-outline:hover {
            background: #1E3A5F;
            color: white;
        }

        .btn-small {
            padding: 6px 14px;
            font-size: 13px;
            width: auto;
            margin: 0 4px;
            display: inline-block;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #D1FAE5;
            color: #065F46;
        }

        .message.error {
            background: #FEE2E2;
            color: #991B1B;
        }

        .navbar {
            background: white;
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1E3A5F;
        }

        .upload-area {
            background: white;
            border: 2px dashed #D1D5DB;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .upload-area:hover {
            border-color: #1E3A5F;
            background: #F9FAFB;
        }

        .file-list {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #F3F4F6;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 4px;
        }

        .file-meta {
            font-size: 12px;
            color: #6B7280;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: #9CA3AF;
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #1E3A5F;
        }

        .stat-label {
            font-size: 12px;
            color: #6B7280;
            margin-top: 4px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .share-link-input {
            width: 100%;
            padding: 12px;
            margin: 16px 0;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 12px;
            font-family: monospace;
        }

        .file-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 20px;
        }

        .download-info {
            background: #F3F4F6;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
        }

        @media (max-width: 640px) {
            .container, .container-dashboard, .container-share {
                padding: 20px;
            }
            h1 { font-size: 36px; }
            .navbar { flex-direction: column; gap: 12px; }
            .file-item { flex-direction: column; gap: 12px; text-align: center; }
            .stats { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============================================================
        // ADERA - Secure File Sharing Service (FULLY WORKING VERSION)
        // Includes: Auth, File Upload, File Management, Share Links, Download Page
        // ============================================================

        // ========== DATA STORAGE ==========
        let users = JSON.parse(localStorage.getItem('adera_users') || '[]');
        let files = JSON.parse(localStorage.getItem('adera_files') || '[]');
        let currentUserId = localStorage.getItem('adera_currentUserId');
        let shares = JSON.parse(localStorage.getItem('adera_shares') || '[]');

        // ========== HELPER FUNCTIONS ==========
        function saveData() {
            localStorage.setItem('adera_users', JSON.stringify(users));
            localStorage.setItem('adera_files', JSON.stringify(files));
            localStorage.setItem('adera_shares', JSON.stringify(shares));
        }

        function showMessage(message, type = 'info') {
            const msgDiv = document.getElementById('globalMessage');
            if (msgDiv) {
                msgDiv.textContent = message;
                msgDiv.className = `message ${type} show`;
                setTimeout(() => {
                    msgDiv.classList.remove('show');
                }, 3000);
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            return date.toLocaleDateString();
        }

        function generateToken() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== AUTH FUNCTIONS ==========
        function registerUser(username, email, password) {
            if (!username || !email || !password) {
                showMessage('All fields are required', 'error');
                return false;
            }
            if (username.length < 3) {
                showMessage('Username must be at least 3 characters', 'error');
                return false;
            }
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return false;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return false;
            }
            if (users.find(u => u.email === email)) {
                showMessage('User already exists with this email', 'error');
                return false;
            }
            
            const newUser = {
                id: Date.now().toString(),
                username: username,
                email: email,
                password: password,
                createdAt: new Date().toISOString(),
                totalUploads: 0,
                totalShares: 0
            };
            users.push(newUser);
            saveData();
            showMessage('Registration successful! Please login.', 'success');
            return true;
        }

        function loginUser(email, password) {
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                currentUserId = user.id;
                localStorage.setItem('adera_currentUserId', currentUserId);
                showMessage(`Welcome back, ${user.username}!`, 'success');
                checkAndRender();
                return true;
            } else {
                showMessage('Invalid email or password', 'error');
                return false;
            }
        }

        function logoutUser() {
            currentUserId = null;
            localStorage.removeItem('adera_currentUserId');
            showMessage('Logged out successfully', 'info');
            checkAndRender();
        }

        function getCurrentUser() {
            return users.find(u => u.id === currentUserId);
        }

        // ========== FILE FUNCTIONS ==========
        function uploadFile(file) {
            if (!file) return;
            const currentUser = getCurrentUser();
            if (!currentUser) return;
            
            if (file.size > 50 * 1024 * 1024) {
                showMessage('File size exceeds 50MB limit', 'error');
                return;
            }
            
            // For demo, we store file as data URL
            const reader = new FileReader();
            reader.onload = function(e) {
                const newFile = {
                    id: Date.now().toString(),
                    userId: currentUserId,
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    date: new Date().toISOString(),
                    downloads: 0,
                    data: e.target.result // Store file data for download
                };
                files.push(newFile);
                currentUser.totalUploads = (currentUser.totalUploads || 0) + 1;
                saveData();
                showMessage(`File "${file.name}" uploaded successfully!`, 'success');
                checkAndRender();
            };
            reader.readAsDataURL(file);
        }

        function deleteFile(fileId) {
            const file = files.find(f => f.id === fileId);
            if (!file) return;
            if (confirm(`Are you sure you want to delete "${file.name}"?`)) {
                files = files.filter(f => f.id !== fileId);
                saveData();
                showMessage(`File "${file.name}" deleted`, 'info');
                checkAndRender();
            }
        }

        function getUserFiles() {
            return files.filter(f => f.userId === currentUserId);
        }

        // ========== SHARE FUNCTIONS ==========
        function createShareLink(fileId) {
            const file = files.find(f => f.id === fileId);
            if (!file) return;
            
            const token = generateToken();
            const shareUrl = `${window.location.origin}${window.location.pathname}#/share/${token}`;
            
            const share = {
                id: Date.now().toString(),
                fileId: fileId,
                token: token,
                url: shareUrl,
                createdAt: new Date().toISOString(),
                expiresAt: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString(),
                downloads: 0
            };
            
            shares.push(share);
            const currentUser = getCurrentUser();
            if (currentUser) {
                currentUser.totalShares = (currentUser.totalShares || 0) + 1;
            }
            saveData();
            
            // Show modal with link
            showShareModal(shareUrl, share.expiresAt);
        }

        function showShareModal(url, expiresAt) {
            const modalDiv = document.getElementById('modalContainer');
            const expiryDate = new Date(expiresAt).toLocaleDateString();
            
            modalDiv.innerHTML = `
                <div class="modal" onclick="closeModal()">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <h3>🔗 Share Link Created!</h3>
                        <p style="color: #6B7280; font-size: 14px;">Share this link with anyone</p>
                        <input class="share-link-input" type="text" value="${url}" readonly id="shareLinkInput">
                        <p style="font-size: 12px; color: #6B7280;">Expires: ${expiryDate}</p>
                        <div class="modal-buttons" style="display: flex; gap: 12px; margin-top: 16px;">
                            <button class="btn-small btn-success" style="flex:1;" onclick="copyShareLink()">📋 Copy Link</button>
                            <button class="btn-small btn-outline" style="flex:1;" onclick="closeModal()">Close</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function copyShareLink() {
            const input = document.getElementById('shareLinkInput');
            if (input) {
                input.select();
                document.execCommand('copy');
                showMessage('Link copied to clipboard!', 'success');
                closeModal();
            }
        }

        function closeModal() {
            const modalDiv = document.getElementById('modalContainer');
            if (modalDiv) modalDiv.innerHTML = '';
        }

        // ========== SHARE/DOWNLOAD PAGE HANDLER ==========
        function handleSharePage(token) {
            const share = shares.find(s => s.token === token);
            
            if (!share) {
                return `
                    <div class="container-share">
                        <h1>🔒 ADERA</h1>
                        <div style="text-align: center; padding: 40px;">
                            <div style="font-size: 64px; margin-bottom: 20px;">🔗❌</div>
                            <h2>Invalid or Expired Link</h2>
                            <p style="color: #6B7280; margin-top: 10px;">This share link is invalid or has expired.</p>
                            <a href="/" style="display: inline-block; margin-top: 20px; color: #1E3A5F; text-decoration: none;">← Back to Home</a>
                        </div>
                    </div>
                `;
            }
            
            // Check expiration
            if (new Date() > new Date(share.expiresAt)) {
                return `
                    <div class="container-share">
                        <h1>🔒 ADERA</h1>
                        <div style="text-align: center; padding: 40px;">
                            <div style="font-size: 64px; margin-bottom: 20px;">⏰❌</div>
                            <h2>Link Expired</h2>
                            <p style="color: #6B7280; margin-top: 10px;">This share link has expired.</p>
                            <a href="/" style="display: inline-block; margin-top: 20px; color: #1E3A5F; text-decoration: none;">← Back to Home</a>
                        </div>
                    </div>
                `;
            }
            
            const file = files.find(f => f.id === share.fileId);
            if (!file) {
                return `
                    <div class="container-share">
                        <h1>🔒 ADERA</h1>
                        <div style="text-align: center; padding: 40px;">
                            <div style="font-size: 64px; margin-bottom: 20px;">📁❌</div>
                            <h2>File Not Found</h2>
                            <p style="color: #6B7280; margin-top: 10px;">The shared file no longer exists.</p>
                            <a href="/" style="display: inline-block; margin-top: 20px; color: #1E3A5F; text-decoration: none;">← Back to Home</a>
                        </div>
                    </div>
                `;
            }
            
            // Increment download count
            share.downloads++;
            file.downloads = (file.downloads || 0) + 1;
            saveData();
            
            return `
                <div class="container-share">
                    <h1>🔒 ADERA</h1>
                    <div style="text-align: center;">
                        <div class="file-icon">📄</div>
                        <h2>${escapeHtml(file.name)}</h2>
                        <div class="download-info">
                            <p>📁 Size: ${formatBytes(file.size)}</p>
                            <p>📅 Shared: ${formatDate(share.createdAt)}</p>
                            <p>⏰ Expires: ${new Date(share.expiresAt).toLocaleDateString()}</p>
                            <p>📥 Downloads: ${share.downloads}</p>
                        </div>
                        <button class="btn btn-success" onclick="downloadSharedFile('${file.id}', '${file.name}')">
                            ⬇️ Download File
                        </button>
                        <p style="margin-top: 20px; font-size: 12px; color: #6B7280;">
                            🔒 Secure sharing powered by ADERA
                        </p>
                        <a href="/" style="display: inline-block; margin-top: 15px; color: #6B7280; text-decoration: none;">← Back to ADERA</a>
                    </div>
                </div>
            `;
        }
        
        function downloadSharedFile(fileId, fileName) {
            const file = files.find(f => f.id === fileId);
            if (file && file.data) {
                const link = document.createElement('a');
                link.href = file.data;
                link.download = fileName;
                link.click();
                showMessage('Download started!', 'success');
            } else {
                showMessage('File data not available', 'error');
            }
        }

        // ========== RENDER FUNCTIONS ==========
        function checkAndRender() {
            const hash = window.location.hash;
            const shareMatch = hash.match(/#\/share\/(.+)/);
            
            if (shareMatch) {
                renderSharePage(shareMatch[1]);
            } else {
                renderMainApp();
            }
        }
        
        function renderSharePage(token) {
            const app = document.getElementById('app');
            app.innerHTML = handleSharePage(token);
        }
        
        function renderMainApp() {
            const app = document.getElementById('app');
            const currentUser = getCurrentUser();
            
            if (currentUser) {
                renderDashboard(app, currentUser);
            } else {
                renderAuth(app);
            }
        }

        function renderAuth(container) {
            container.innerHTML = `
                <div class="container">
                    <h1>🔒 ADERA</h1>
                    <p class="tagline">Secure File Sharing • አደራ በእምነት</p>
                    
                    <div class="tab-buttons">
                        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                        <button class="tab-btn" onclick="switchTab('register')">Register</button>
                    </div>
                    
                    <div id="loginForm" class="form active">
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="loginEmail" placeholder="you@example.com">
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter your password">
                        </div>
                        <button class="btn" onclick="handleLogin()">Login</button>
                    </div>
                    
                    <div id="registerForm" class="form">
                        <div class="input-group">
                            <label>Username</label>
                            <input type="text" id="regUsername" placeholder="Choose a username">
                        </div>
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="regEmail" placeholder="you@example.com">
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="regPassword" placeholder="Min 6 characters">
                        </div>
                        <button class="btn" onclick="handleRegister()">Create Account</button>
                    </div>
                    
                    <div id="globalMessage" class="message"></div>
                </div>
            `;
        }

        function renderDashboard(container, user) {
            const userFiles = getUserFiles();
            const totalSize = userFiles.reduce((sum, f) => sum + f.size, 0);
            
            container.innerHTML = `
                <div class="container-dashboard">
                    <div class="navbar">
                        <div class="logo">🔒 ADERA</div>
                        <div class="user-info" style="display: flex; align-items: center; gap: 16px;">
                            <span>👋 ${escapeHtml(user.username)}</span>
                            <button class="btn-small btn-outline" onclick="logoutUser()">Logout</button>
                        </div>
                    </div>
                    
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-number">${userFiles.length}</div>
                            <div class="stat-label">Total Files</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${formatBytes(totalSize)}</div>
                            <div class="stat-label">Storage Used</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${user.totalShares || 0}</div>
                            <div class="stat-label">Shares Created</div>
                        </div>
                    </div>
                    
                    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                        <div style="font-size: 48px; margin-bottom: 12px;">📁</div>
                        <div>Click or drag & drop to upload</div>
                        <div style="font-size: 12px; color: #9CA3AF; margin-top: 8px;">Maximum file size: 50MB</div>
                        <input type="file" id="fileInput" style="display: none" onchange="handleFileSelect(this)">
                    </div>
                    
                    <div class="file-list">
                        <h3>📁 My Files</h3>
                        <div id="fileListContainer">
                            ${renderFileList(userFiles)}
                        </div>
                    </div>
                    
                    <div id="globalMessage" class="message"></div>
                </div>
                <div id="modalContainer"></div>
            `;
            
            // Setup drag and drop
            const uploadArea = document.querySelector('.upload-area');
            if (uploadArea) {
                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.style.borderColor = '#1E3A5F';
                    uploadArea.style.background = '#F9FAFB';
                });
                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.style.borderColor = '#D1D5DB';
                    uploadArea.style.background = 'white';
                });
                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.style.borderColor = '#D1D5DB';
                    uploadArea.style.background = 'white';
                    const file = e.dataTransfer.files[0];
                    if (file) uploadFile(file);
                });
            }
        }

        function renderFileList(userFiles) {
            if (userFiles.length === 0) {
                return `
                    <div class="empty-state">
                        <div style="font-size: 64px; margin-bottom: 16px;">📭</div>
                        <p>No files uploaded yet</p>
                        <p style="font-size: 12px; margin-top: 8px;">Click the upload area to add your first file</p>
                    </div>
                `;
            }
            
            return userFiles.map(file => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div class="file-meta">
                            ${formatBytes(file.size)} • ${formatDate(file.date)} • 
                            ${file.downloads || 0} downloads
                        </div>
                    </div>
                    <div class="file-actions" style="display: flex; gap: 8px;">
                        <button class="btn-small" onclick="createShareLink('${file.id}')">🔗 Share</button>
                        <button class="btn-small btn-danger" onclick="deleteFile('${file.id}')">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) uploadFile(file);
            input.value = '';
        }

        // ========== GLOBAL FUNCTIONS ==========
        window.switchTab = function(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const buttons = document.querySelectorAll('.tab-btn');
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                buttons[0].classList.remove('active');
                buttons[1].classList.add('active');
            }
        };
        
        window.handleLogin = function() {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            loginUser(email, password);
        };
        
        window.handleRegister = function() {
            const username = document.getElementById('regUsername')?.value;
            const email = document.getElementById('regEmail')?.value;
            const password = document.getElementById('regPassword')?.value;
            registerUser(username, email, password);
        };
        
        window.deleteFile = deleteFile;
        window.createShareLink = createShareLink;
        window.logoutUser = logoutUser;
        window.handleFileSelect = handleFileSelect;
        window.uploadFile = uploadFile;
        window.copyShareLink = copyShareLink;
        window.closeModal = closeModal;
        window.downloadSharedFile = downloadSharedFile;
        
        // ========== ROUTER ==========
        window.addEventListener('hashchange', checkAndRender);
        
        // ========== INITIALIZE ==========
        checkAndRender();
    </script>
</body>
</html>
